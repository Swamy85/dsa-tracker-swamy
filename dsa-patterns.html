<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DSA Pattern Tracker</title>
<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: #e2e8f0;
    padding: 20px;
}
h1 {
    text-align: center;
}
.section {
    margin: 20px 0;
    padding: 15px;
    border-radius: 10px;
    background: #1e293b;
}
h2 {
    color: #38bdf8;
}
.problem {
    display: flex;
    align-items: center;
    margin: 8px 0;
}
.problem input {
    margin-right: 10px;
}
a {
    color: #22c55e;
    text-decoration: none;
}
a:hover {
    text-decoration: underline;
}
.progress {
    font-size: 18px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<h1>🚀 DSA Practice Tracker</h1>
<div class="progress" id="progress"></div>

<div id="container"></div>

<script>
const data = {
"Sliding Window": [
["Maximum Average Subarray I","https://leetcode.com/problems/maximum-average-subarray-i/"],
["Find All Anagrams in a String","https://leetcode.com/problems/find-all-anagrams-in-a-string/"],
["Longest Substring Without Repeating Characters","https://leetcode.com/problems/longest-substring-without-repeating-characters/"],
["Longest Repeating Character Replacement","https://leetcode.com/problems/longest-repeating-character-replacement/"],
["Minimum Window Substring","https://leetcode.com/problems/minimum-window-substring/"],
["Fruit Into Baskets","https://leetcode.com/problems/fruit-into-baskets/"]
],

"Two Pointers": [
["Two Sum II","https://leetcode.com/problems/two-sum-ii-input-array-is-sorted/"],
["Valid Palindrome","https://leetcode.com/problems/valid-palindrome/"],
["3Sum","https://leetcode.com/problems/3sum/"],
["Container With Most Water","https://leetcode.com/problems/container-with-most-water/"],
["Remove Duplicates","https://leetcode.com/problems/remove-duplicates-from-sorted-array/"],
["Trapping Rain Water","https://leetcode.com/problems/trapping-rain-water/"]
],

"HashMap": [
["Two Sum","https://leetcode.com/problems/two-sum/"],
["Valid Anagram","https://leetcode.com/problems/valid-anagram/"],
["First Unique Character","https://leetcode.com/problems/first-unique-character-in-a-string/"],
["Group Anagrams","https://leetcode.com/problems/group-anagrams/"],
["Subarray Sum Equals K","https://leetcode.com/problems/subarray-sum-equals-k/"],
["Longest Consecutive Sequence","https://leetcode.com/problems/longest-consecutive-sequence/"]
],

"Binary Search": [
["Binary Search","https://leetcode.com/problems/binary-search/"],
["Search Insert Position","https://leetcode.com/problems/search-insert-position/"],
["Find Peak Element","https://leetcode.com/problems/find-peak-element/"],
["Search in Rotated Sorted Array","https://leetcode.com/problems/search-in-rotated-sorted-array/"],
["First Bad Version","https://leetcode.com/problems/first-bad-version/"],
["Koko Eating Bananas","https://leetcode.com/problems/koko-eating-bananas/"],
["Capacity to Ship Packages","https://leetcode.com/problems/capacity-to-ship-packages-within-d-days/"],
["Median of Two Sorted Arrays","https://leetcode.com/problems/median-of-two-sorted-arrays/"]
],

"Stack": [
["Valid Parentheses","https://leetcode.com/problems/valid-parentheses/"],
["Min Stack","https://leetcode.com/problems/min-stack/"],
["Next Greater Element","https://leetcode.com/problems/next-greater-element-i/"],
["Daily Temperatures","https://leetcode.com/problems/daily-temperatures/"],
["Largest Rectangle in Histogram","https://leetcode.com/problems/largest-rectangle-in-histogram/"]
],

"Prefix Sum": [
["Range Sum Query","https://leetcode.com/problems/range-sum-query-immutable/"],
["Running Sum","https://leetcode.com/problems/running-sum-of-1d-array/"],
["Subarray Sum Equals K","https://leetcode.com/problems/subarray-sum-equals-k/"],
["Continuous Subarray Sum","https://leetcode.com/problems/continuous-subarray-sum/"],
["Pivot Index","https://leetcode.com/problems/find-pivot-index/"],
["Max Size Subarray Sum K","https://leetcode.com/problems/maximum-size-subarray-sum-equals-k/"],
["Count Nice Subarrays","https://leetcode.com/problems/count-number-of-nice-subarrays/"]
]
};

const container = document.getElementById("container");

function render() {
    let total = 0, done = 0;

    for (let section in data) {
        const div = document.createElement("div");
        div.className = "section";
        div.innerHTML = `<h2>${section}</h2>`;

        data[section].forEach((item, index) => {
            const key = section + index;
            const checked = localStorage.getItem(key) === "true";

            total++;
            if (checked) done++;

            const p = document.createElement("div");
            p.className = "problem";
            p.innerHTML = `
                <input type="checkbox" ${checked ? "checked" : ""} onchange="toggle('${key}')">
                <a href="${item[1]}" target="_blank">${item[0]}</a>
            `;
            div.appendChild(p);
        });

        container.appendChild(div);
    }

    document.getElementById("progress").innerText =
        `Progress: ${done} / ${total} Completed`;
}

function toggle(key) {
    const value = localStorage.getItem(key) === "true";
    localStorage.setItem(key, !value);
    location.reload();
}

render();
</script>

</body>
</html>
